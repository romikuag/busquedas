<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pallarols Santander — Búsquedas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF8F4;--carbon:#1E1C1A;--gold:#B89A5E;--gold-light:#F5EDD8;
  --gold-mid:#D4B87A;--border:#E5DDD0;--muted:#8A8278;--surface:#fff;
  --green-pale:#D6EFE0;--red-pale:#FAD9D9;--amber-pale:#FDF0CC;
  --green-txt:#1A5C30;--red-txt:#8B2020;--amber-txt:#7A5000;
  --green:#1D9E75;--red:#C0392B;--amber:#E6A817;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--carbon);min-height:100vh}
.screen{display:none}.screen.active{display:block}
.loading{position:fixed;inset:0;background:rgba(250,248,244,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* HOME */
.home-wrap{max-width:440px;margin:0 auto;padding:3rem 1.5rem}
.home-logo{width:60px;height:60px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.home-logo svg{width:26px;height:26px;fill:var(--gold)}
.home-brand{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;text-align:center;margin-bottom:4px}
.home-sub{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:2rem}
.home-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem}
.home-card-title{font-size:15px;font-weight:500;margin-bottom:4px}
.home-card-desc{font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.5}
.btn-primary{width:100%;padding:12px;background:var(--carbon);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.btn-gold{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.input-base{width:100%;padding:11px 14px;border:0.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--carbon);margin-bottom:10px}
.input-base:focus{outline:none;border-color:var(--gold)}
/* HEADERS */
.top-bar{background:var(--carbon);padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.tb-logo{width:34px;height:34px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-logo svg{width:15px;height:15px;fill:var(--gold)}
.tb-brand{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;color:#fff}
.tb-sub{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.tb-btns{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.btn-sm{padding:6px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-sm-gold{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-sm-light{background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.75)}
.btn-sm-green{background:var(--green);color:#fff;border:none}
.btn-sm-carbon{background:var(--carbon);color:#fff;border:1px solid rgba(255,255,255,0.2)}
/* DASHBOARD */
.dash-body{padding:1.25rem;max-width:700px;margin:0 auto}
.dash-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.dash-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{padding:5px 14px;border:0.5px solid var(--border);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;background:transparent;color:var(--carbon)}
.filter-btn.active{background:var(--carbon);color:#fff;border-color:var(--carbon)}
.search-item{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.search-item-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-client-name{font-size:14px;font-weight:500;color:var(--carbon);flex:1;min-width:100px}
.search-date{font-size:11px;color:var(--muted)}
.search-alert{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:#E8F5E9;color:#1B5E20}
.search-item-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.status-badge{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.st-proceso{background:#E3F2FD;color:#0D47A1}
.st-standby{background:var(--amber-pale);color:var(--amber-txt)}
.st-noprosperó{background:var(--red-pale);color:var(--red-txt)}
.st-exitoso{background:var(--green-pale);color:var(--green-txt)}
.btn-action{padding:5px 12px;border:0.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--carbon)}
.btn-action-red{border-color:#F09595;color:var(--red-txt)}
.status-selector{display:none;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)}
.status-selector.open{display:flex}
/* AGENT PANEL */
.agent-body{padding:1.25rem;max-width:680px;margin:0 auto}
.section-lbl{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;margin-top:1.25rem}
.section-lbl:first-child{margin-top:0}
.client-row{display:flex;gap:8px}
.client-row input{flex:1;padding:10px 14px;border:0.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--carbon)}
.client-row input:focus{outline:none;border-color:var(--gold)}
.btn-confirm{background:var(--carbon);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.inst-row{display:flex;gap:6px;flex-wrap:wrap}
.inst-btn{padding:6px 16px;border:0.5px solid var(--border);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--carbon)}
.inst-btn.active{background:var(--carbon);color:#fff;border-color:var(--carbon)}
.inst-btn.add{border-style:dashed;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:0.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);color:var(--carbon)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fg textarea{min-height:70px;resize:none}
.prefix-wrap{display:flex;align-items:center;border:0.5px solid var(--border);border-radius:10px;background:var(--surface);overflow:hidden}
.prefix-wrap:focus-within{border-color:var(--gold)}
.prefix-tag{padding:10px 10px 10px 13px;font-size:13px;font-weight:500;color:var(--gold);background:var(--gold-light);border-right:0.5px solid var(--border);white-space:nowrap}
.prefix-tag.plain{color:var(--muted);background:var(--cream);font-size:12px}
.prefix-wrap input{border:none;background:transparent;flex:1;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--carbon)}
.prefix-wrap input:focus{outline:none}
.m2-wrap{display:flex;align-items:center;border:0.5px solid var(--border);border-radius:10px;background:var(--surface);overflow:hidden}
.m2-wrap:focus-within{border-color:var(--gold)}
.m2f{display:flex;align-items:center;flex:1}
.m2f input{border:none;background:transparent;padding:10px 4px 10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--carbon);width:60px;min-width:0}
.m2f input:focus{outline:none}
.m2s{font-size:12px;color:var(--muted);padding-right:8px;white-space:nowrap}
.m2sep{width:0.5px;background:var(--border);align-self:stretch}
.img-drop{width:100%;border:1.5px dashed var(--border);border-radius:10px;background:var(--surface);cursor:pointer;position:relative;overflow:hidden}
.img-drop.loaded{border-style:solid;border-color:var(--gold-mid)}
.img-drop.drag{border-color:var(--gold);background:var(--gold-light)}
.img-drop-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;text-align:center}
.img-drop-inner.h{display:none}
.img-preview{width:100%;height:120px;object-fit:cover;display:block}
.img-preview.h{display:none}
.img-file-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-remove-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:15px;cursor:pointer;display:none;align-items:center;justify-content:center}
.img-drop.loaded .img-remove-btn{display:flex}
.btn-add{width:100%;padding:12px;background:var(--carbon);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px}
.prop-list{margin-top:1.25rem}
.prop-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;margin-bottom:7px}
.prop-thumb{width:56px;height:34px;border-radius:5px;flex-shrink:0;overflow:hidden;background:var(--gold-light);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold)}
.prop-thumb img{width:56px;height:34px;object-fit:cover;display:block}
.pi-badge{font-size:10px;font-weight:500;background:var(--gold-light);color:#7A5C2E;border-radius:20px;padding:3px 9px;white-space:nowrap}
.pi-name{flex:1;font-size:13px;font-weight:500;color:var(--carbon);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-price{color:var(--muted);font-size:12px;white-space:nowrap}
.pi-btns{display:flex;gap:4px;flex-shrink:0}
.pi-btn{background:none;border:0.5px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:11px;padding:3px 8px;font-family:'DM Sans',sans-serif}
.pi-btn-del{color:var(--red-txt);border-color:#F09595}
.link-box{background:var(--gold-light);border:0.5px solid var(--gold-mid);border-radius:10px;padding:12px 14px;margin-top:1rem;display:flex;align-items:center;gap:10px}
.link-box-url{font-size:12px;color:var(--carbon);font-weight:500;word-break:break-all;flex:1}
.btn-copy{background:var(--carbon);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
.empty-msg{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:13px}
/* RESPONSES / CLIENT CARDS */
.inst-nav{display:flex;gap:6px;padding:10px 1.25rem;border-bottom:0.5px solid var(--border);overflow-x:auto;background:var(--cream)}
.inst-nav::-webkit-scrollbar{display:none}
.inav-btn{padding:5px 15px;border:0.5px solid var(--border);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--carbon);white-space:nowrap}
.inav-btn.active{background:var(--carbon);color:#fff;border-color:var(--carbon)}
.cards-area{padding:1.25rem;max-width:700px;margin:0 auto}
.inst-lbl{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
.prop-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:1rem;overflow:hidden}
.prop-card.estado-no{border-left:3px solid var(--red)}
.prop-card.estado-standby{border-left:3px solid var(--amber)}
.prop-card.estado-visita{border-left:3px solid var(--green)}
.card-img{width:100%;height:130px;background:var(--gold-light);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:11px}
.card-img img{width:100%;height:130px;object-fit:cover;display:block}
.card-info{padding:10px 14px 6px}
.card-line1{font-size:12px;font-weight:500;color:var(--carbon);margin-bottom:3px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--carbon);line-height:1.2;margin-bottom:3px}
.card-meta{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:2px}
.card-link{font-size:12px;color:#185FA5;display:inline-block;margin:6px 0 8px}
.card-actions{padding:0 14px 12px}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.act-btn{padding:9px 4px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;text-align:center;line-height:1.3;border:1.5px solid;transition:all 0.2s}
.act-btn:active{transform:scale(0.97)}
.btn-no{border-color:#EAB0B0;background:transparent;color:#A03030}
.btn-sb{border-color:#E8CC70;background:transparent;color:#8A6400}
.btn-vi{border-color:#80CC90;background:transparent;color:#1E6830}
.btn-no.sel{background:var(--red-pale);border-color:#D06060;color:var(--red-txt);box-shadow:0 0 0 1.5px #D06060}
.btn-sb.sel{background:var(--amber-pale);border-color:#DDB830;color:var(--amber-txt);box-shadow:0 0 0 1.5px #DDB830}
.btn-vi.sel{background:var(--green-pale);border-color:#50A860;color:var(--green-txt);box-shadow:0 0 0 1.5px #50A860}
.resp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:0 14px 10px}
.resp-btn{padding:9px 4px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;text-align:center;line-height:1.3;border:1.5px solid;pointer-events:none}
.rb-no{border-color:#EAB0B0;background:transparent;color:#A03030}
.rb-sb{border-color:#E8CC70;background:transparent;color:#8A6400}
.rb-vi{border-color:#80CC90;background:transparent;color:#1E6830}
.rb-co{border-color:#90C4E8;background:transparent;color:#1A5276}
.rb-no.sel{background:var(--red-pale);border-color:#D06060;color:var(--red-txt)}
.rb-sb.sel{background:var(--amber-pale);border-color:#DDB830;color:var(--amber-txt)}
.rb-vi.sel{background:var(--green-pale);border-color:#50A860;color:var(--green-txt)}
.rb-co.sel{background:#D6EAF8;border-color:#5DADE2;color:#1A5276}
.btn-co{border-color:#90C4E8;background:transparent;color:#1A5276}
.btn-co.sel{background:#D6EAF8;border-color:#5DADE2;color:#1A5276;box-shadow:0 0 0 1.5px #5DADE2}
.consulta-box{margin:0 14px 12px;background:#D6EAF8;border-radius:8px;padding:10px 12px;font-size:12px;color:#1A5276;line-height:1.6}
.consulta-respondida{margin:0 14px 12px;background:#D6EAF8;border-radius:8px;padding:10px 12px;font-size:12px;color:#1A5276;line-height:1.6}
.expand-zone{border-top:0.5px solid var(--border)}
.exp-inner{padding:12px 14px}
.exp-lbl{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;margin-top:10px}
.exp-lbl:first-child{margin-top:0}
.exp-textarea{width:100%;border:0.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--carbon);background:var(--cream);resize:none;min-height:64px}
.exp-input{width:100%;border:0.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--carbon);background:var(--cream)}
.vis-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-confirm2{width:100%;margin-top:10px;background:var(--carbon);color:#fff;border:none;border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.motivo-box{margin:0 14px 12px;background:var(--red-pale);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red-txt);line-height:1.6}
.visita-ok{margin:0 14px 12px;background:var(--green-pale);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--green-txt);line-height:1.6}
.saved-tag{font-size:11px;color:var(--green-txt);margin-top:8px;text-align:center}
.resumen{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:1.25rem;border-top:0.5px solid var(--border);max-width:700px;margin:0 auto}
.res-box{border-radius:10px;padding:12px 8px;text-align:center}
.res-box-v{background:var(--green-pale)}.res-box-s{background:var(--amber-pale)}.res-box-n{background:var(--red-pale)}
.res-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;line-height:1}
.res-num-v{color:var(--green-txt)}.res-num-s{color:var(--amber-txt)}.res-num-n{color:var(--red-txt)}
.res-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.8px}
/* CLIENT HEADER */
.client-header{background:var(--carbon);padding:1.5rem 1.25rem 1.25rem;position:sticky;top:0;z-index:10}
.ch-brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ch-brand-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:#fff}
.ch-brand-sub{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.ch-greeting{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.5}
.ch-greeting strong{color:#fff}
.ch-progress{margin-top:14px}
.ch-prog-row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:5px}
.ch-prog-bar{height:1.5px;background:rgba(255,255,255,0.12);border-radius:2px}
.ch-prog-fill{height:1.5px;background:var(--gold-mid);border-radius:2px;transition:width 0.5s}
.resp-header{background:var(--gold-light);border-bottom:0.5px solid var(--gold-mid);padding:10px 1.25rem;font-size:12px;color:#7A5C2E;font-weight:500}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="loading-spinner"></div><div class="loading-txt">Cargando...</div></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
